<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Administrador</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<header>
  <div class="logo">Panel Administrador</div>
  <nav>
    <a href="index.html">Inicio</a>
    <a href="transparencia.html">Transparencia</a>
  </nav>
</header>

<main class="contenedor">

  <section id="loginAdmin" class="tarjeta-admin">
    <h2>Acceso de administrador</h2>
    <p>Ingresa la clave para administrar los documentos.</p>

    <input type="password" id="claveAdmin" placeholder="Contraseña">
    <button onclick="iniciarSesion()">Ingresar</button>

    <p id="mensajeLogin" class="mensaje-error"></p>
  </section>

  <section id="panelAdmin" class="tarjeta-admin oculto">
    <h2>Agregar sección de documentos</h2>

    <label>Título de la sección</label>
    <input type="text" id="tituloSeccion" placeholder="Ejemplo: Artículo 8">

    <label>Descripción o mini formato</label>
    <textarea id="descripcionSeccion" placeholder="Ejemplo: Documentos correspondientes a transparencia del ejercicio 2026"></textarea>

    <h3>Documentos / Hipervínculos</h3>

    <div id="listaInputsDocumentos"></div>

    <button type="button" onclick="agregarCampoDocumento()">+ Agregar otro documento</button>
    <button type="button" onclick="guardarSeccion()">Guardar sección</button>
    <button type="button" class="btn-secundario" onclick="cerrarSesion()">Cerrar sesión</button>

    <p id="mensajeAdmin" class="mensaje-exito"></p>
  </section>

  <section id="vistaAdmin" class="tarjeta-admin oculto">
    <h2>Secciones registradas</h2>
    <div id="contenedorAdminDocumentos"></div>
    <button class="btn-peligro" onclick="borrarTodo()">Borrar todo</button>
  </section>

</main>

<script src="js/admin.js"></script>
</body>
</html>
